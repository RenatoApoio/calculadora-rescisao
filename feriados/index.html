<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Feriados Nacionais 2025 e 2026 — Calendário Completo | FacilCalc</title>
<meta name="description" content="Calendário completo de feriados nacionais do Brasil em 2025 e 2026. Veja quantos dias faltam para cada feriado e planeje suas férias."/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;color:#222;min-height:100vh}
header{background:linear-gradient(135deg,#b71c1c,#e53935);color:#fff;padding:28px 16px 20px;text-align:center}
header h1{font-size:1.5rem;font-weight:800;letter-spacing:-.5px}
header p{font-size:.92rem;opacity:.88;margin-top:6px}
.nav{background:#fff;padding:10px 16px;border-bottom:1px solid #e0e0e0}
.nav a{color:#1a73e8;text-decoration:none;font-size:.9rem;font-weight:600}
main{max-width:900px;margin:0 auto;padding:16px}
.card{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:22px;margin-bottom:16px}
.card h2{font-size:1.05rem;color:#b71c1c;margin-bottom:14px;font-weight:700}
.ano-tabs{display:flex;gap:8px;margin-bottom:16px}
.ano-tab{flex:1;padding:10px;text-align:center;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;border:2px solid #e0e0e0;background:#f5f5f5;color:#555;transition:.15s}
.ano-tab.ativo{background:#b71c1c;color:#fff;border-color:#b71c1c}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat{background:#fff5f5;border:2px solid #ffcdd2;border-radius:10px;padding:12px;text-align:center}
.stat .sn{font-size:1.8rem;font-weight:900;color:#b71c1c}
.stat .sl{font-size:.72rem;color:#888;margin-top:2px}
.spinner{display:inline-block;width:28px;height:28px;border:4px solid #e0e0e0;border-top-color:#e53935;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading{text-align:center;padding:30px;color:#888}
.feriado-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f5f5f5}
.feriado-item:last-child{border:none}
.feriado-date{text-align:center;background:#fff5f5;border:2px solid #ffcdd2;border-radius:10px;padding:6px 10px;min-width:60px;flex-shrink:0}
.feriado-date .dia{font-size:1.4rem;font-weight:900;color:#b71c1c;line-height:1}
.feriado-date .mes{font-size:.68rem;font-weight:700;color:#888;text-transform:uppercase}
.feriado-date .dsem{font-size:.66rem;color:#aaa;margin-top:1px}
.feriado-nome{flex:1}
.feriado-nome strong{font-size:.9rem;font-weight:700;display:block}
.feriado-nome .tipo{font-size:.73rem;color:#888;margin-top:2px}
.badge-dias{background:#ffcdd2;color:#b71c1c;border-radius:20px;padding:3px 10px;font-size:.72rem;font-weight:700;white-space:nowrap;flex-shrink:0}
.badge-passou{background:#f5f5f5;color:#aaa;border-radius:20px;padding:3px 10px;font-size:.72rem;font-weight:700;white-space:nowrap;flex-shrink:0}
.badge-hoje{background:#e8f5e9;color:#2e7d32;border-radius:20px;padding:3px 10px;font-size:.72rem;font-weight:700;white-space:nowrap;flex-shrink:0}
.proximo-box{background:linear-gradient(135deg,#b71c1c,#e53935);color:#fff;border-radius:14px;padding:20px;text-align:center;margin-bottom:14px}
.proximo-box label{font-size:.82rem;opacity:.8;display:block;margin-bottom:6px}
.proximo-box .pname{font-size:1.3rem;font-weight:900}
.proximo-box .pdays{font-size:.9rem;opacity:.85;margin-top:4px}
.erro{background:#ffebee;border:1px solid #ef9a9a;border-radius:10px;padding:16px;color:#c62828;text-align:center;font-size:.9rem}
footer{text-align:center;padding:20px;font-size:.8rem;color:#888;background:#fff;margin-top:20px;border-top:1px solid #eee}
footer a{color:#1a73e8;text-decoration:none}
</style>
</head>
<body>
<header>
  <h1>🎉 Feriados Nacionais</h1>
  <p>Calendário completo 2025 e 2026 — saiba quantos dias faltam</p>
</header>
<nav class="nav"><a href="../">← FacilCalc</a></nav>
<main>
  <div class="card">
    <h2>📅 Selecione o Ano</h2>
    <div class="ano-tabs">
      <button class="ano-tab ativo" id="tab-2025" onclick="setAno(2025)">📅 2025</button>
      <button class="ano-tab" id="tab-2026" onclick="setAno(2026)">📅 2026</button>
    </div>
    <div id="loading"><div class="spinner"></div><br>Carregando feriados...</div>
    <div id="content-area"></div>
    <div id="erro-box" style="display:none" class="erro">⚠️ Erro ao carregar feriados. Tente novamente.</div>
  </div>
</main>
<footer>© 2025 <a href="../">FacilCalc</a> · Dados: BrasilAPI / Ministério do Trabalho</footer>
<script src="../shared.js"></script>
<script>
var anoAtual=2025;
var cacheData={};
var hoje=new Date();
hoje.setHours(0,0,0,0);

var MESES=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
var DIAS_SEM=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
var MESES_EXT=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

function setAno(ano){
  anoAtual=ano;
  document.getElementById('tab-2025').classList.toggle('ativo',ano===2025);
  document.getElementById('tab-2026').classList.toggle('ativo',ano===2026);
  if(cacheData[ano]){renderFeriados(cacheData[ano]);}
  else{carregarFeriados(ano);}
}

async function carregarFeriados(ano){
  document.getElementById('loading').style.display='block';
  document.getElementById('content-area').innerHTML='';
  document.getElementById('erro-box').style.display='none';
  try{
    var r=await fetch('https://brasilapi.com.br/api/feriados/v1/'+ano);
    if(!r.ok)throw new Error('HTTP '+r.status);
    var data=await r.json();
    cacheData[ano]=data;
    renderFeriados(data);
  }catch(e){
    document.getElementById('loading').style.display='none';
    document.getElementById('erro-box').style.display='block';
  }
}

function renderFeriados(data){
  var total=data.length;
  var proximos=data.filter(function(f){
    var d=new Date(f.date+'T00:00:00');
    return d>=hoje;
  });
  var passados=total-proximos.length;
  var fimSemana=data.filter(function(f){
    var d=new Date(f.date+'T00:00:00');
    return d.getDay()===0||d.getDay()===6;
  }).length;
  var uteis=total-fimSemana;

  var html='';

  // Próximo feriado
  if(proximos.length>0){
    var prox=proximos[0];
    var dProx=new Date(prox.date+'T00:00:00');
    var diff=Math.round((dProx-hoje)/(1000*60*60*24));
    html+='<div class="proximo-box">';
    html+='<label>⏳ Próximo Feriado</label>';
    html+='<div class="pname">'+prox.name+'</div>';
    var dataFmt=dProx.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
    var diffTxt=diff===0?' — HOJE!':diff===1?' — Amanhã!':' — em '+diff+' dias';
    html+='<div class="pdays">'+dataFmt+diffTxt+'</div>';
    html+='</div>';
  }

  // Stats
  html+='<div class="stats-row">';
  html+='<div class="stat"><div class="sn">'+total+'</div><div class="sl">Feriados totais</div></div>';
  html+='<div class="stat"><div class="sn">'+uteis+'</div><div class="sl">Dias úteis afetados</div></div>';
  html+='<div class="stat"><div class="sn">'+proximos.length+'</div><div class="sl">Ainda por vir</div></div>';
  html+='</div>';

  // Lista
  html+='<div>';
  data.forEach(function(f){
    var d=new Date(f.date+'T00:00:00');
    var diff=Math.round((d-hoje)/(1000*60*60*24));
    var diaSem=DIAS_SEM[d.getDay()];
    var badge='';
    if(diff===0){badge='<span class="badge-hoje">🎉 Hoje!</span>';}
    else if(diff<0){badge='<span class="badge-passou">Passou</span>';}
    else if(diff===1){badge='<span class="badge-dias">Amanhã</span>';}
    else{badge='<span class="badge-dias">em '+diff+'d</span>';}

    var tipo=f.type==='national'?'🇧🇷 Nacional':f.type==='optional'?'📋 Facultativo':'📅 Observância';
    html+='<div class="feriado-item">';
    html+='<div class="feriado-date"><div class="dia">'+d.getDate()+'</div><div class="mes">'+MESES[d.getMonth()]+'</div><div class="dsem">'+diaSem+'</div></div>';
    html+='<div class="feriado-nome"><strong>'+f.name+'</strong><div class="tipo">'+tipo+'</div></div>';
    html+=badge;
    html+='</div>';
  });
  html+='</div>';

  document.getElementById('content-area').innerHTML=html;
  document.getElementById('loading').style.display='none';
}

carregarFeriados(2025);
</script>
</body>
</html>
